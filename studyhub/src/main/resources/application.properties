spring.application.name=studyhub

# 1. CẤU HÌNH KẾT NỐI MYSQL (Đã thêm tham số cho phép lấy Public Key)
spring.datasource.url=jdbc:mysql://localhost:3306/studyhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. CẤU HÌNH HIBERNATE / JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# 3. CẤU HÌNH SERVER PORT
server.port=8080

# Bật log hiển thị chi tiết giá trị truyền vào các dấu hỏi chấm (?) của Hibernate
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.hibernate.stat=debug

