spring.application.name=studyhub

# 1. CẤU HÌNH KẾT NỐI MYSQL
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:studyhub;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MYSQLUSER:sa}
spring.datasource.password=${MYSQLPASSWORD:}

# 2. CẤU HÌNH HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# 3. CẤU HÌNH SERVER PORT
server.port=${PORT:8081}

# Bật log hiển thị chi tiết giá trị truyền vào các dấu hỏi chấm (?) của Hibernate
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.hibernate.stat=debug